# .github/dependabot.yml: Automates dependency updates.
---
version: 2
updates:
  # GitHub Actions dependencies
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    groups:
      actions-deps:
        applies-to: version-updates
        patterns:
          - '*'
    labels:
      - 'dependencies'
      - 'actions-deps'
    commit-message:
      prefix: 'deps(actions)'
    open-pull-requests-limit: 5

  # NPM dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
    groups:
      npm-deps:
        applies-to: version-updates
        patterns:
          - '*'
    labels:
      - 'dependencies'
      - 'npm-deps'
    commit-message:
      prefix: 'deps(npm)'
    open-pull-requests-limit: 5

  # Python dependencies
  - package-ecosystem: 'pip'
    directory: '/'
    schedule:
      interval: 'monthly'
    groups:
      pip-deps:
        applies-to: version-updates
        patterns:
          - '*'
    labels:
      - 'dependencies'
      - 'pip-deps'
    commit-message:
      prefix: 'deps(pip)'
    open-pull-requests-limit: 5

  # Pre-commit hook revs
  - package-ecosystem: 'pre-commit'
    directory: '/'
    schedule:
      interval: 'monthly'
    groups:
      pre-commit-deps:
        applies-to: version-updates
        patterns:
          - '*'
    labels:
      - 'dependencies'
      - 'pre-commit-deps'
    commit-message:
      prefix: 'deps(pre-commit)'
    open-pull-requests-limit: 2
