# .github/dependabot.yml: Automates dependency updates.
---
version: 2

updates:
  # NOTE: The devcontainers entry below hosts two YAML anchors (&defaults and
  # &default-group) that all subsequent entries inherit via merge keys (<<: *defaults)
  # and value references (*default-group). Do not reorder or delete this entry
  # without migrating the anchors to the new first entry.
  # Dev Container Features
  - &defaults
    package-ecosystem: 'devcontainers'
    directory: '/'
    schedule:
      interval: 'monthly'
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    allow:
      - dependency-type: 'direct'
    groups:
      devcontainers-deps: &default-group
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
    labels:
      - 'dependencies'
      - 'devcontainers-deps'
    commit-message:
      prefix: 'deps(devcontainers)'
    open-pull-requests-limit: 3

  # Python dependencies
  - <<: *defaults
    package-ecosystem: 'pip'
    groups:
      pip-deps: *default-group
    labels:
      - 'dependencies'
      - 'pip-deps'
    commit-message:
      prefix: 'deps(pip)'

  # NPM dependencies
  - <<: *defaults
    package-ecosystem: 'npm'
    groups:
      npm-deps: *default-group
    labels:
      - 'dependencies'
      - 'npm-deps'
    commit-message:
      prefix: 'deps(npm)'

  # Pre-commit hook revs
  - <<: *defaults
    package-ecosystem: 'pre-commit'
    groups:
      pre-commit-deps: *default-group
    labels:
      - 'dependencies'
      - 'pre-commit-deps'
    commit-message:
      prefix: 'deps(pre-commit)'

  # GitHub Actions dependencies
  - <<: *defaults
    package-ecosystem: 'github-actions'
    groups:
      actions-deps: *default-group
    labels:
      - 'dependencies'
      - 'actions-deps'
    commit-message:
      prefix: 'deps(actions)'
