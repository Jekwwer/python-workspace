---
name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target: [lint, format, type, spell]

    steps:
      - name: checkout-code
        uses: actions/checkout@v4.2.2

      - name: setup-python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.14'

      - name: setup-node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20.x'

      - name: cache-pip-and-poetry
        uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: cache-npm
        uses: actions/cache@v4.2.3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: install-poetry
        run: pip install poetry

      - name: install-python-dependencies
        run: poetry install --no-interaction --no-ansi --with test,lint,mypy

      - name: install-node-dependencies
        run: npm ci

      - name: run-${{ matrix.target }}
        run: make ${{ matrix.target }}

  test-and-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: checkout-code
        uses: actions/checkout@v4.2.2

      - name: setup-python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.14'

      - name: cache-pip-and-poetry
        uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: install-poetry
        run: pip install poetry

      - name: install-python-dependencies
        run: poetry install --no-interaction --no-ansi --with test

      - name: run-tests
        run: make test

      - name: upload-coverage
        uses: codecov/codecov-action@v5.4.3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true
