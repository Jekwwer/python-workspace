---
name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target: [lint, format, type, spell]

    steps:
      - name: checkout-code
        uses: actions/checkout@v4.2.2

      - name: install-poetry
        run: pipx install 'poetry>=2.3,<3'

      - name: setup-python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.14'
          cache: poetry

      - name: setup-node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20.x'
          cache: npm

      - name: install-python-dependencies
        run: poetry install --no-interaction --with test,lint,mypy

      - name: install-node-dependencies
        run: npm ci

      - name: run-${{ matrix.target }}
        run: make ${{ matrix.target }}

  test-and-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: checkout-code
        uses: actions/checkout@v4.2.2

      - name: install-poetry
        run: pipx install 'poetry>=2.3,<3'

      - name: setup-python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.14'
          cache: poetry

      - name: install-python-dependencies
        run: poetry install --no-interaction --with test

      - name: run-tests
        run: make test

      - name: upload-coverage
        uses: codecov/codecov-action@v5.4.3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true
