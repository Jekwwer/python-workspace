---
name: deploy-docs

on:
  workflow_run:
    workflows: ['release']
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-docs:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment:
      name: github-pages

    steps:
      - name: checkout-code
        uses: actions/checkout@v4.2.2

      - name: install-poetry
        run: pipx install 'poetry>=2.3,<3'

      - name: setup-python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.14'
          cache: poetry

      - name: install-python-dependencies
        run: poetry install --no-interaction --with docs

      - name: docs-clean
        run: make docs-clean

      - name: docs-build
        run: make docs-build

      - name: configure-pages
        uses: actions/configure-pages@v5.0.0

      - name: upload-pages-artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: docs/build/html

      - name: deploy-pages
        uses: actions/deploy-pages@v4.0.5
