---
name: release

on:
  workflow_run:
    workflows: ['ci']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write # OIDC token for sigstore keyless signing
      attestations: write
    steps:
      - name: checkout-code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: install-poetry
        run: pipx install 'poetry>=2.3,<3'

      - name: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'
          cache: poetry

      - name: setup-node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          cache: npm

      - name: install-node-dependencies
        run: npm ci

      - name: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make release

      - name: attest-build-provenance
        id: attest
        if: hashFiles('dist/*') != ''
        # yamllint disable-line rule:line-length
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'dist/*'

      - name: upload-attestation-to-release
        if: steps.attest.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(git describe --tags --abbrev=0)
          DEST="dist/attestation-$TAG.intoto.jsonl"
          cp "${{ steps.attest.outputs.bundle-path }}" "$DEST"
          gh release upload "$TAG" "$DEST" --clobber
