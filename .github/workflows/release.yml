---
name: release

on:
  workflow_run:
    workflows: ['ci']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write # OIDC token for sigstore keyless signing
      attestations: write
    steps:
      - name: checkout-code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: install-poetry
        run: pipx install 'poetry>=2.3,<3'

      - name: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'
          cache: poetry

      - name: setup-node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          cache: npm

      - name: install-node-dependencies
        run: npm ci

      - name: release
        env:
          # GH_TOKEN: admin PAT bypasses branch protection on bot's release commit.
          # Falls back to GITHUB_TOKEN; release will fail until secret is set.
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: make release

      - name: attest-build-provenance
        if: hashFiles('dist/*') != ''
        # yamllint disable-line rule:line-length
        uses: actions/attest-build-provenance@e4d4f7c39adfa4c260fb5c147f0622000aa14b99 # v4.0.0
        with:
          subject-path: 'dist/*'
