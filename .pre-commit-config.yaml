---
default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit] # commit-msg hooks opt in explicitly

ci:
  run_on_all_branches: true
  autofix_commit_msg: 'ci(pre-commit): auto fixes from pre-commit hooks'
  autofix_prs: true
  autoupdate_schedule: never # Dependabot owns rev bumps (.github/dependabot.yml)
  skip:
    - mypy # ci can't run local hooks
    - markdown-link-check # ci has no network access

repos:
  # ── File & Git Checks ──────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
        name: 'check:merge-conflicts'
      - id: check-case-conflict
        name: 'check:case-conflicts'
      - id: check-ast
        name: 'check:ast'
      - id: check-shebang-scripts-are-executable
        name: 'check:shebang-permissions'
      - id: check-executables-have-shebangs
        name: 'check:exec-shebang'
      - id: check-symlinks
        name: 'check:symlinks'
      - id: detect-private-key
        name: 'detect:private-keys'
      - id: check-json
        name: 'validate:json'
      - id: check-toml
        name: 'validate:toml'
      - id: check-yaml
        name: 'validate:yaml'
      - id: name-tests-test
        name: 'validate:test-names'
        args: ['--pytest'] # enforce *_test.py, not test_*.py
      - id: check-vcs-permalinks
        name: 'validate:vcs-permalinks'
      - id: debug-statements
        name: 'detect:debug-statements'
      - id: end-of-file-fixer
        name: 'fix:newline-eof'
      - id: mixed-line-ending
        name: 'fix:line-endings'
        args: [--fix=lf]
      - id: trailing-whitespace
        name: 'fix:trailing-whitespace'
      - id: check-added-large-files
        name: 'check:large-files'

  # ── Python Anti-pattern Checks ─────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-no-eval
        name: 'detect:no-eval'
      - id: python-no-log-warn
        name: 'detect:no-log-warn'
      - id: python-check-blanket-noqa
        name: 'validate:noqa-specific'
      - id: python-check-blanket-type-ignore
        name: 'validate:type-ignore-specific'
      - id: python-check-mock-methods
        name: 'validate:mock-methods'
      - id: text-unicode-replacement-char
        name: 'detect:unicode-replacement-char'

  # ── Python Lint & Format ───────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        name: 'lint:ruff'
        args: ['--fix']
      - id: ruff-format
        name: 'format:ruff'

  # ── Python Type Check ──────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: mypy
        name: 'typecheck:mypy'
        entry: make type
        language: system
        files: '^(src|tests)/.*\.py$'
        pass_filenames: false

  # ── Markdown ───────────────────────────────────────────────────────────────
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        name: 'lint:markdown'

  - repo: https://github.com/tcort/markdown-link-check
    rev: v3.14.2
    hooks:
      - id: markdown-link-check
        name: 'check:md-links'
        args: ['--config', '.mlc-config.json']
        exclude: '^\.github/PULL_REQUEST_TEMPLATE\.md$'

  # ── YAML ───────────────────────────────────────────────────────────────────
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        name: 'lint:yaml'
        args: ['--strict']

  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        name: 'lint:gha'

  # ── reStructuredText ───────────────────────────────────────────────────────
  - repo: https://github.com/dzhu/rstfmt
    rev: v0.0.14
    hooks:
      - id: rstfmt
        name: 'format:rst'
        args: ['-w', '120']
        files: ^docs/source/.*\.rst$

  # ── Multi-format (Prettier) ────────────────────────────────────────────────
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.3
    hooks:
      - id: prettier
        name: 'format:prettier'
        args: ['--write']

  # ── Spelling ───────────────────────────────────────────────────────────────
  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v10.0.0
    hooks:
      - id: cspell
        name: 'check:spelling'
      - id: cspell
        name: 'check:commit-spelling'
        args:
          - --no-must-find-files
          - --no-progress
          - --no-summary
          - --files
          - .git/COMMIT_EDITMSG
        stages: [commit-msg]
        always_run: true

  # ── Tests ──────────────────────────────────────────────────────────────────
  - repo: https://github.com/christophmeissner/pytest-pre-commit
    rev: 1.0.0
    hooks:
      - id: pytest
        name: 'test:pytest'
        pass_filenames: false
        always_run: true
        additional_dependencies:
          - pytest
          - pytest-cov
          - pytest-xdist
          - coverage[toml]

  # ── Project Health ─────────────────────────────────────────────────────────
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject
        name: 'validate:pyproject'

  - repo: local
    hooks:
      - id: poetry-lock-check
        name: 'validate:poetry-lock'
        entry: poetry check --lock
        language: system
        files: ^(pyproject\.toml|poetry\.lock)$
        pass_filenames: false

  # ── Commit Message ─────────────────────────────────────────────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        name: 'validate:commit-msg'
        stages: [commit-msg]
        args:
          - feat
          - fix
          - ci
          - chore
          - docs
          - style
          - refactor
          - perf
          - test
          - build
          - revert
          - security
          - deps
